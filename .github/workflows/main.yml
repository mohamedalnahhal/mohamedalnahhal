name: Update README stats

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours; adjust as you like
  workflow_dispatch:          # lets you trigger it manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Generate stats SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
          # BIRTHDAY: '2000-01-01'   # uncomment + set to enable the age/status row
        run: python generate_readme.py

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache/
          git diff --staged --quiet || git commit -m "Update README stats"
          git push
